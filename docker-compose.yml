# Engram — self-hosted deployment
#
# Usage:
#   1. Copy .env.example to .env and set passwords
#   2. docker compose up -d
#   3. Apply migrations: docker compose exec engram-service psql ...
#      (or use the init-db script once available)
#
# The service is reachable at http://localhost:8000
# Over Tailscale, use the host's Tailscale IP instead of localhost.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engram-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engram}
      POSTGRES_USER: ${POSTGRES_USER:-engram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engram}
    volumes:
      - engram-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engram}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  engram-service:
    build: .
    container_name: engram-service
    environment:
      ENGRAM_DATABASE_URL: postgresql+asyncpg://engram:${POSTGRES_PASSWORD:-engram}@postgres:5432/${POSTGRES_DB:-engram}
      ENGRAM_HOST: 0.0.0.0
      ENGRAM_PORT: 8000
      ENGRAM_LOG_LEVEL: ${ENGRAM_LOG_LEVEL:-info}
      ENGRAM_AUTH_ENABLED: ${ENGRAM_AUTH_ENABLED:-false}
      ENGRAM_EMBEDDING_PROVIDER: ${ENGRAM_EMBEDDING_PROVIDER:-none}
      ENGRAM_OPENAI_API_KEY: ${ENGRAM_OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  engram-db-data:
