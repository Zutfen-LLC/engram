# Engram — self-hosted deployment
#
# Quickstart:
#   1. cp .env.example .env   # then edit .env (set POSTGRES_PASSWORD, etc.)
#   2. docker compose up -d
#   3. docker compose exec engram-service engram bootstrap-key   # first API key
#
# The service is reachable at http://localhost:8000
#
# --- Migration behavior ----------------------------------------------------
# Postgres's docker-entrypoint-initdb.d runs the bundled migrations in
# ./migrations ONLY on FIRST BOOT, i.e. when the data volume is empty. It does
# NOT run on subsequent starts. To apply NEW migrations to an existing database
# (upgrades), run the explicit migration command:
#     docker compose exec engram-service engram init-db
# For a database that was already bootstrapped by first-boot initdb, baseline it
# once so future migrations are tracked:
#     docker compose exec engram-service engram init-db --baseline
# See docs/deployment.md (Upgrades & migrations) for the full procedure.
#
# --- DB roles --------------------------------------------------------------
# Two roles are used for defense-in-depth tenant isolation (ENG-AUD-002):
#   POSTGRES_OWNER_USER/PASSWORD -> the table-owning superuser that runs
#       migrations and admin/bootstrap commands (bypasses RLS).
#   POSTGRES_APP_USER/PASSWORD   -> the non-owner application role the service
#       connects as at runtime (subject to RLS; no table ownership, no
#       BYPASSRLS). Created by migrations/003_app_role_and_force_rls.sql; its
#       password is set on first boot by migrations/app_role_password.sh.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engram-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engram}
      # Owner/migration superuser. Falls back to the legacy POSTGRES_USER/
      # POSTGRES_PASSWORD for .env files that predate the owner/app split.
      POSTGRES_USER: ${POSTGRES_OWNER_USER:-${POSTGRES_USER:-engram}}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:-${POSTGRES_PASSWORD:-engram}}
      # Consumed by migrations/app_role_password.sh on first boot only.
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-engram_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-engram_app}
    volumes:
      - engram-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_OWNER_USER:-${POSTGRES_USER:-engram}} -d ${POSTGRES_DB:-engram}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  engram-service:
    build:
      context: .
      target: runtime
    container_name: engram-service
    environment:
      # Runtime: connect as the non-owner app role (RLS-enforced).
      ENGRAM_DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:-engram_app}:${POSTGRES_APP_PASSWORD:-engram_app}@postgres:5432/${POSTGRES_DB:-engram}
      # Migrations/admin: connect as the owner (bypasses RLS for DDL + cross-
      # tenant CLI paths). Used by `engram init-db`, `engram bootstrap-key`, and
      # `engram promote-proposed` / `engram backfill-embeddings`.
      ENGRAM_OWNER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_OWNER_USER:-${POSTGRES_USER:-engram}}:${POSTGRES_OWNER_PASSWORD:-${POSTGRES_PASSWORD:-engram}}@postgres:5432/${POSTGRES_DB:-engram}
      ENGRAM_HOST: 0.0.0.0
      ENGRAM_PORT: 8000
      ENGRAM_LOG_LEVEL: ${ENGRAM_LOG_LEVEL:-info}
      ENGRAM_AUTH_ENABLED: ${ENGRAM_AUTH_ENABLED:-false}
      ENGRAM_EMBEDDING_PROVIDER: ${ENGRAM_EMBEDDING_PROVIDER:-none}
      ENGRAM_OPENAI_API_KEY: ${ENGRAM_OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Compose healthcheck probes liveness (/health, DB-free). We deliberately
    # do NOT probe /ready here: a transient Postgres outage (e.g. maintenance)
    # would otherwise mark the container unhealthy and trigger pointless restart
    # loops. DB + RLS + pgvector readiness is asserted at startup via depends_on
    # and by operators calling /ready directly.
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import sys,urllib.request as u;
          sys.exit(0 if u.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  engram-db-data:
