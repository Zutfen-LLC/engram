name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-real-db-ci:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose Config
        run: docker compose -f docker-compose.ci.yml config -q

      - name: Run Compose Real-DB CI Stack
        run: docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit --exit-code-from engram-test

      - name: Show Compose Logs On Failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color

      - name: Clean Up Compose Stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

  compose-validate:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment compose syntax
        run: docker compose config -q

      - name: Validate deployment compose content
        run: |
          set -euo pipefail
          SERVICES=$(docker compose config --services)
          echo "Services: $SERVICES"

          # The worker service must be part of the standard stack.
          if ! echo "$SERVICES" | grep -qx 'engram-worker'; then
            echo "ERROR: engram-worker service not found in resolved compose config"
            exit 1
          fi

          # The worker command must be 'engram worker' (no inline poll-interval).
          WORKER_CMD=$(docker compose config --json engram-worker \
            | python -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d.get('command',[])))")
          echo "Worker command: $WORKER_CMD"
          if [ "$WORKER_CMD" != "engram worker" ]; then
            echo "ERROR: engram-worker command should be 'engram worker', got '$WORKER_CMD'"
            exit 1
          fi

          # The worker must not publish any ports.
          PORTS=$(docker compose config --json engram-worker \
            | python -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('ports',[])))")
          echo "Worker published ports: $PORTS"
          if [ "$PORTS" != "0" ]; then
            echo "ERROR: engram-worker should not publish any ports"
            exit 1
          fi

          echo "All worker assertions passed."
