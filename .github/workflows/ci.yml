name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  compose-real-db-ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ENGRAM_CI_IMAGE: engram-ci:${{ github.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate Compose Config
        run: docker compose -f docker-compose.ci.yml config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load CI image with trusted main cache export
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ci
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.ENGRAM_CI_IMAGE }}
          cache-from: type=gha,scope=engram-ci
          cache-to: type=gha,mode=max,scope=engram-ci
          provenance: false

      - name: Build and load CI image with isolated PR cache export
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ci
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.ENGRAM_CI_IMAGE }}
          cache-from: type=gha,scope=engram-ci
          cache-to: type=gha,mode=min,scope=engram-ci
          provenance: false

      - name: Run Compose Real-DB CI Stack
        run: docker compose -f docker-compose.ci.yml up --no-build --abort-on-container-exit --exit-code-from engram-test

      - name: Show Compose Logs On Failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color

      - name: Clean Up Compose Stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

  compose-validate:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate deployment compose syntax
        run: docker compose config -q

      - name: Validate deployment compose content
        run: |
          set -euo pipefail
          SERVICES=$(docker compose config --services)
          echo "Services: $SERVICES"

          # The worker service must be part of the standard stack.
          if ! echo "$SERVICES" | grep -qx 'engram-worker'; then
            echo "ERROR: engram-worker service not found in resolved compose config"
            exit 1
          fi

          # Resolve compose with sentinel values for representative shared and
          # API-only settings, then verify the configuration contract:
          #   - shared sentinels reach BOTH engram-service and engram-worker
          #   - API-only sentinels reach engram-service ONLY
          #   - worker command is 'engram worker' with no published ports
          export ENGRAM_VOCAB_CACHE_TTL_SECONDS=999
          export ENGRAM_VOCAB_CACHE_MAX_TENANTS=888
          export ENGRAM_PROMOTION_CONFLICT_CANDIDATE_K=777
          export ENGRAM_USAGE_TELEMETRY_ENABLED=true
          export ENGRAM_API_KEY_CACHE_TTL_SECONDS=666
          export ENGRAM_READ_DATABASE_URL='postgresql+asyncpg://sentinel-read'
          export ENGRAM_RECALL_BYTE_BUDGET=555
          export ENGRAM_STARTUP_PROMOTION_LIMIT=444

          API_CONFIG=$(docker compose config engram-service)
          WORKER_CONFIG=$(docker compose config engram-worker)

          require_env() {
            service=$1
            config=$2
            key=$3
            expected=$4
            if ! printf '%s\n' "$config" | awk -v key="$key" -v expected="$expected" '
              $1 == key ":" {
                value = substr($0, index($0, ":") + 1)
                sub(/^[[:space:]]+/, "", value)
                sub(/[[:space:]]+$/, "", value)
                if ((substr(value, 1, 1) == "\"" && substr(value, length(value), 1) == "\"") ||
                    (substr(value, 1, 1) == "\047" && substr(value, length(value), 1) == "\047")) {
                  value = substr(value, 2, length(value) - 2)
                }
                found = (value == expected)
              }
              END { exit !found }
            '; then
              echo "ERROR: $key=$expected missing/wrong on $service"
              exit 1
            fi
          }

          reject_env() {
            service=$1
            config=$2
            key=$3
            if printf '%s\n' "$config" | awk -v key="$key" '$1 == key ":" { found = 1 } END { exit !found }'; then
              echo "ERROR: $key should NOT be on $service"
              exit 1
            fi
          }

          # Compose emits command in block-list form; bound collection to the
          # command field so unrelated YAML list items cannot satisfy it.
          WORKER_COMMAND=$(printf '%s\n' "$WORKER_CONFIG" | awk '
            /^[[:space:]]+command:[[:space:]]*$/ {
              in_command = 1
              command_indent = index($0, "c") - 1
              next
            }
            in_command {
              match($0, /^[[:space:]]*/)
              if (RLENGTH <= command_indent) { exit }
              if ($1 == "-") {
                value = substr($0, index($0, "-") + 1)
                sub(/^[[:space:]]+/, "", value)
                gsub(/^[\047"]|[\047"]$/, "", value)
                command = command (command ? " " : "") value
              }
            }
            END { print command }
          ')
          if [ "$WORKER_COMMAND" != "engram worker" ]; then
            echo "ERROR: expected worker command 'engram worker', got '$WORKER_COMMAND'"
            exit 1
          fi
          echo "Worker command: $WORKER_COMMAND"

          # Reject a ports key at the worker service's immediate child depth.
          if printf '%s\n' "$WORKER_CONFIG" | awk '
            /^[[:space:]]+engram-worker:[[:space:]]*$/ {
              service_indent = index($0, "e") - 1
              in_service = 1
              next
            }
            in_service {
              match($0, /^[[:space:]]*/)
              if (NF && RLENGTH <= service_indent) { exit }
              if (RLENGTH == service_indent + 2 && $1 == "ports:") { found = 1 }
            }
            END { exit !found }
          '; then
            echo "ERROR: engram-worker must not publish ports"
            exit 1
          fi
          echo "Worker published ports: 0"

          for entry in \
            'ENGRAM_VOCAB_CACHE_TTL_SECONDS=999' \
            'ENGRAM_VOCAB_CACHE_MAX_TENANTS=888' \
            'ENGRAM_PROMOTION_CONFLICT_CANDIDATE_K=777' \
            'ENGRAM_USAGE_TELEMETRY_ENABLED=true'; do
            key=${entry%%=*}
            expected=${entry#*=}
            require_env engram-service "$API_CONFIG" "$key" "$expected"
            require_env engram-worker "$WORKER_CONFIG" "$key" "$expected"
          done
          echo "Shared sentinel checks: 4 passed"

          for entry in \
            'ENGRAM_API_KEY_CACHE_TTL_SECONDS=666' \
            'ENGRAM_READ_DATABASE_URL=postgresql+asyncpg://sentinel-read' \
            'ENGRAM_RECALL_BYTE_BUDGET=555' \
            'ENGRAM_STARTUP_PROMOTION_LIMIT=444'; do
            key=${entry%%=*}
            expected=${entry#*=}
            require_env engram-service "$API_CONFIG" "$key" "$expected"
            reject_env engram-worker "$WORKER_CONFIG" "$key"
          done
          echo "API-only sentinel checks: 4 passed"

          require_env engram-service "$API_CONFIG" ENGRAM_JOB_MAX_ATTEMPTS 5
          require_env engram-worker "$WORKER_CONFIG" ENGRAM_JOB_MAX_ATTEMPTS 5
          echo "ENGRAM_JOB_MAX_ATTEMPTS present on both services"

          echo "All compose content assertions passed."

  # Lightweight, parallel cross-language conformance job for the ENG-CONTEXT-001
  # context-manifest contract. Runs the Python verifier and the JavaScript
  # verifier against the SAME checked-in golden vectors. Independent of the
  # Docker Compose real-DB job (does not lengthen its critical path) and does
  # NOT install Node in any production/CI Docker image — Node comes only from
  # actions/setup-node here. No third-party JavaScript packages are used.
  conformance-vectors:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install engram with dev extras (jsonschema for the verifier)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Verify vectors (Python)
        run: python scripts/verify_context_manifest_vectors.py

      - name: Verify vectors (JavaScript, independent RFC 8785 + SHA-256)
        run: node conformance/context-manifest-v1/verify.mjs

      - name: Verify negative conformance fixtures (Python)
        run: python scripts/verify_context_manifest_negatives.py

      - name: Verify negative conformance fixtures (JavaScript)
        run: node conformance/context-manifest-v1/verify_negatives.mjs

      - name: Verify vectors cross-language (Python runner drives JS negatives)
        run: python conformance/context-manifest-v1/run_cross_language.py

  # Lightweight lock-consistency gate. Fails if uv.lock has drifted from
  # pyproject.toml. Kept off the Compose real-DB critical path (runs in this
  # parallel job) and does not rewrite the lockfile.
  lock-drift:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"
          enable-cache: false

      - name: Verify uv.lock matches pyproject.toml (no rewrite)
        run: uv lock --check
