name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-real-db-ci:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose Config
        run: docker compose -f docker-compose.ci.yml config -q

      - name: Run Compose Real-DB CI Stack
        run: docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit --exit-code-from engram-test

      - name: Show Compose Logs On Failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color

      - name: Clean Up Compose Stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

  compose-validate:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment compose syntax
        run: docker compose config -q

      - name: Validate deployment compose content
        run: |
          set -euo pipefail
          pip3 install --quiet pyyaml

          SERVICES=$(docker compose config --services)
          echo "Services: $SERVICES"

          # The worker service must be part of the standard stack.
          if ! echo "$SERVICES" | grep -qx 'engram-worker'; then
            echo "ERROR: engram-worker service not found in resolved compose config"
            exit 1
          fi

          # Resolve compose with sentinel values for representative shared and
          # API-only settings, then verify the configuration contract:
          #   - shared sentinels reach BOTH engram-service and engram-worker
          #   - API-only sentinels reach engram-service ONLY
          #   - worker command is 'engram worker' with no published ports
          export ENGRAM_VOCAB_CACHE_TTL_SECONDS=999
          export ENGRAM_VOCAB_CACHE_MAX_TENANTS=888
          export ENGRAM_PROMOTION_CONFLICT_CANDIDATE_K=777
          export ENGRAM_API_KEY_CACHE_TTL_SECONDS=666
          export ENGRAM_READ_DATABASE_URL='postgresql+asyncpg://sentinel-read'
          export ENGRAM_RECALL_BYTE_BUDGET=555
          export ENGRAM_STARTUP_PROMOTION_LIMIT=444

          docker compose config \
            | python3 -c "
          import sys, yaml

          cfg = yaml.safe_load(sys.stdin)
          svc = cfg['services']
          api_env = svc['engram-service']['environment']
          worker_env = svc['engram-worker']['environment']

          # Worker command and ports.
          cmd = ' '.join(svc['engram-worker'].get('command', []))
          print(f'Worker command: {cmd}')
          assert cmd == 'engram worker', f'expected \"engram worker\", got \"{cmd}\"'

          ports = svc['engram-worker'].get('ports', [])
          print(f'Worker published ports: {len(ports)}')
          assert len(ports) == 0, f'expected no ports, got {ports}'

          # Shared sentinels must appear on both services.
          shared_sentinels = {
              'ENGRAM_VOCAB_CACHE_TTL_SECONDS': '999',
              'ENGRAM_VOCAB_CACHE_MAX_TENANTS': '888',
              'ENGRAM_PROMOTION_CONFLICT_CANDIDATE_K': '777',
          }
          for key, expected in shared_sentinels.items():
              assert api_env.get(key) == expected, \\
              f'{key}={api_env.get(key)!r} missing/wrong on engram-service'
              assert worker_env.get(key) == expected, \\
              f'{key}={worker_env.get(key)!r} missing/wrong on engram-worker'
          print(f'Shared sentinel checks: {len(shared_sentinels)} passed')

          # API-only sentinels must appear on engram-service only.
          api_only_sentinels = {
              'ENGRAM_API_KEY_CACHE_TTL_SECONDS': '666',
              'ENGRAM_READ_DATABASE_URL': 'postgresql+asyncpg://sentinel-read',
              'ENGRAM_RECALL_BYTE_BUDGET': '555',
              'ENGRAM_STARTUP_PROMOTION_LIMIT': '444',
          }
          for key, expected in api_only_sentinels.items():
              assert api_env.get(key) == expected, \\
              f'{key}={api_env.get(key)!r} missing/wrong on engram-service'
              assert key not in worker_env, \\
              f'{key} should NOT be on engram-worker (got {worker_env.get(key)!r})'
          print(f'API-only sentinel checks: {len(api_only_sentinels)} passed')

          # ENGRAM_JOB_MAX_ATTEMPTS must be present on both (enqueued by API,
          # used by worker).
          for name, env in [('engram-service', api_env), ('engram-worker', worker_env)]:
              assert 'ENGRAM_JOB_MAX_ATTEMPTS' in env, \\
              f'ENGRAM_JOB_MAX_ATTEMPTS missing from {name}'
          print('ENGRAM_JOB_MAX_ATTEMPTS present on both services')
          "

          echo "All compose content assertions passed."
