# Stock-Hermes dogfood profile — Engram dual-face integration.
# Compatibility contract pinned to NousResearch/hermes-agent
# 36f2a966c7f9f69987494b867c3dcf96b69a5766.

name: engram-dogfood

# MemoryProvider face: governed write interception and lifecycle capture.
memory:
  provider: engram_memory

# General-plugin face: safe same-turn reads through pre_llm_call. Selecting
# memory.provider alone does not enable this independently loaded face.
plugins:
  enabled:
    - engram_memory

# Optional explicit Engram operations remain available through MCP.
mcp_servers:
  engram:
    command: python
    args: ["-m", "engram_mcp"]
    env:
      ENGRAM_BASE_URL: "${ENGRAM_BASE_URL}"
      ENGRAM_API_KEY: "${ENGRAM_API_KEY}"

env:
  ENGRAM_BASE_URL: "${ENGRAM_BASE_URL}"
  ENGRAM_API_KEY: "${ENGRAM_API_KEY}"
  ENGRAM_HOOKS_RECALL_ENABLED: "true"
  ENGRAM_HOOKS_COMPAT_SHIM: "true"
  ENGRAM_HOOKS_REQUIRE_AUTOMATIC_CAPTURE: "true"

# HERMES_SAFE_MODE=1 disables all general plugins, including automatic Engram
# read recall. It does not turn MCP into an automatic read path.
